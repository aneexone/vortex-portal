<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workineo</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0b2a4a;
    color: white;
}

/* HERO SECTION */
.hero {
    position: relative;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

/* DARK BLUE BACKGROUND */
.hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, #0d3b66, #071a2f);
}

/* ORANGE CURVE TOP */
.hero::after {
    content: "";
    position: absolute;
    width: 140%;
    height: 140%;
    border: 30px solid transparent;
    border-top: 30px solid #ff7a00;
    border-radius: 50%;
    top: -60%;
    left: -20%;
    transform: rotate(10deg);
}

/* ORANGE CURVE BOTTOM */
.curve-bottom {
    position: absolute;
    width: 140%;
    height: 140%;
    border: 30px solid transparent;
    border-bottom: 30px solid #ff7a00;
    border-radius: 50%;
    bottom: -60%;
    right: -20%;
    transform: rotate(10deg);
}

/* CONTENT */
.content {
    position: relative;
    z-index: 2;
}

.logo {
    font-size: 42px;
    font-weight: bold;
}

.logo span {
    color: #ff7a00;
}

.tagline {
    margin-top: 10px;
    font-size: 18px;
    opacity: 0.9;
}

/* BUTTONS */
.buttons {
    margin-top: 30px;
}

.btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 12px 22px;
    margin: 10px;
    border-radius: 30px;
    text-decoration: none;
    color: white;
    font-weight: 600;
    transition: 0.3s;
}

.whatsapp {
    background: #25D366;
}

.telegram {
    background: #0088cc;
}

.btn:hover {
    transform: scale(1.1);
}

/* FLOAT BUTTONS */
.float {
    position: fixed;
    right: 20px;
    bottom: 20px;
    z-index: 999;
}

.float a {
    display: block;
    margin: 10px 0;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    color: white;
    text-align: center;
    line-height: 55px;
    font-size: 22px;
}

.float .wa { background: #25D366; }
.float .tg { background: #0088cc; }

</style>
</head>

<body>

<section class="hero">

    <div class="content">
        <div class="logo">
            Workin<span>eo</span>
        </div>

        <div class="tagline">
            Empowering Businesses & Connecting Talent Worldwide
        </div>

        <div class="buttons">
            <a href="https://wa.me/855962636490" class="btn whatsapp" target="_blank">
                <i class="fab fa-whatsapp"></i> WhatsApp
            </a>

            <a href="https://t.me/ChatWorkineo" class="btn telegram" target="_blank">
                <i class="fab fa-telegram"></i> Telegram
            </a>
        </div>
    </div>

    <div class="curve-bottom"></div>

</section>

<!-- FLOAT ICONS -->
<div class="float">
    <a href="https://wa.me/855962636490" class="wa" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>
    <a href="https://t.me/ChatWorkineo" class="tg" target="_blank">
        <i class="fab fa-telegram"></i>
    </a>
</div>

</body>
</html>
